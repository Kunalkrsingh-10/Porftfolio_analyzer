# Standalone compose for the backend-only stack (api_service only).
# Databases are hosted remotely on Atlas + Railway — no local containers.
#
# Use this for backend-only development (no frontend):
#   docker compose up --build
#
# For the full stack (frontend + backend):
#   docker compose up --build   (from the kalpi-ai/ root)

services:

  # ---------- API SERVICE ----------

  api-service:
    build: ./api_service
    container_name: kalpi-ai-api-service
    restart: unless-stopped
    environment:
      # ── Remote databases ──────────────────────────────────────────────────
      MONGO_URL:    "mongodb+srv://kalpi-ai:kalpi-ai@cluster0.t33jgbr.mongodb.net/?appName=Cluster0"
      DB_NAME:      "kalpi_ai_api_db"
      DATABASE_URL: "postgresql://postgres:qkBKFDSbDybhoaLVHpEJXHBXRpuZaruz@caboose.proxy.rlwy.net:55881/railway"
      # ── LLM (override from host env or .env file) ─────────────────────────
      LLM_PROVIDER:   "${LLM_PROVIDER:-groq}"
      GROQ_API_KEY:   "${GROQ_API_KEY}"
      GROQ_MODEL:     "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      ENV_MODE:       "${ENV_MODE:-production}"
    volumes:
      - ./api_service:/app
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  default:
    driver: bridge
