name: kalpi-ai

# Databases are hosted remotely (Railway Postgres + MongoDB Atlas).
# No local database containers.  Only two containers start:
#   api-service  →  http://localhost:8000
#   frontend     →  http://localhost:3000
#
# Start:   docker compose up --build
# Stop:    docker compose down

services:

  # ─── BACKEND ─────────────────────────────────────────────────────────────────

  api-service:
    build:
      context: ./fastapi-be/api_service
      dockerfile: Dockerfile
    container_name: kalpi-api-service
    restart: unless-stopped
    environment:
      # ── Remote databases (injected directly — no local containers) ──────────
      MONGO_URL:    "mongodb+srv://kalpi-ai:kalpi-ai@cluster0.t33jgbr.mongodb.net/?appName=Cluster0"
      DB_NAME:      "kalpi_ai_api_db"
      DATABASE_URL: "postgresql://postgres:qkBKFDSbDybhoaLVHpEJXHBXRpuZaruz@caboose.proxy.rlwy.net:55881/railway"

      # ── AI / LLM ─────────────────────────────────────────────────────────────
      LLM_PROVIDER:   "${LLM_PROVIDER:-groq}"
      GROQ_API_KEY:   "${GROQ_API_KEY}"
      GROQ_MODEL:     "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"

      # ── App ───────────────────────────────────────────────────────────────────
      ENV_MODE: "${ENV_MODE:-production}"
    ports:
      - "8000:8000"
    networks: [kalpi-net]

  # ─── FRONTEND ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./kalpi-fe
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time.
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
    container_name: kalpi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks: [kalpi-net]
    depends_on:
      - api-service

# ─── NETWORKS ────────────────────────────────────────────────────────────────

networks:
  kalpi-net:
    driver: bridge
