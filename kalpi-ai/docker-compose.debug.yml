# Debug override — adds debugpy to the api-service container.
#
# Usage (from the project root):
#   docker compose -f fastapi-be/docker-compose.yml \
#                  -f docker-compose.debug.yml \
#                  up --build --remove-orphans
#
# Then attach VS Code's "Attach FastAPI (Docker)" launch configuration.

services:
  api-service:
    command: >
      python -m debugpy
        --listen 0.0.0.0:5679
        -m uvicorn main:app
        --host 0.0.0.0 --port 8000 --reload
    ports:
      - "5679:5679"   # debugpy attach port
